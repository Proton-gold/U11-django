#  CI/CD Pipeline — u11_django loyihasi uchun
#  CI  (Continuous Integration):  test + tekshirish
#  CD  (Continuous Deployment):   Docker image build + push

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]        # main'ga push bo'lsa
  pull_request:
    branches: [ "main" ]        # main'ga PR ochilsa (faqat test)

jobs:

  test:
    name:  Test (CI)
    runs-on: ubuntu-latest

    # Test uchun vaqtinchalik Postgres bazasi ko'taramiz
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      # 2) Python o'rnatish
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3) Kutubxonalarni o'rnatish
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Migratsiya + testlarni ishga tushirish
      - name: Run test
        env:
          SECRET_KEY: "test-secret-key-faqat-ci-uchun"
          DEBUG: "False"
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          GOOGLE_CLIENT_ID: "test-client-id"
          GOOGLE_SECRET: "test-client-secret"
        run: |
          python manage.py migrate
          python manage.py test

  # ==========================================================
  #  2-JOB:  BUILD & PUSH  (CD qismi)
  #  Faqat test o'tsa VA main'ga push bo'lsa ishlaydi
  # ==========================================================
  build-and-push:
    name: 🚀 Build & Push (CD)
    runs-on: ubuntu-latest
    needs: test                                  # test'ga bog'liq
    if: github.event_name == 'push'              # PR'da push qilmaydi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Hub'ga login (sirlar Settings > Secrets'da saqlanadi)
      - name: Login for Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Image build qilib, Docker Hub'ga push qilish
      - name:  Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/u11_django:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/u11_django:${{ github.sha }}

  # ==========================================================
  #  3-JOB:  DEPLOY  (serverga chiqarish — CD ning oxiri)
  #  Faqat image push bo'lgandan keyin ishlaydi
  # ==========================================================
  deploy:
    name:  Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push          # image tayyor bo'lsagina
    if: github.event_name == 'push'

    steps:
      - name: SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}      # server IP/domen
          username: ${{ secrets.SERVER_USER }}  # ssh user (root/ubuntu)
          key: ${{ secrets.SERVER_SSH_KEY }}    # ssh private key
          port: 22
          script: |
            cd /home/sultonovshoxrux98/U11-django_devops      # serverdagi loyiha papkasi
            sudo docker compose pull                 # yangi image'ni tort
            sudo docker compose up -d                # qayta ishga tushir
            sudo docker image prune -f               # eski image'larni tozala